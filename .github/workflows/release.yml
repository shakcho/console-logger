name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch, minor, major)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip release commits to avoid infinite loops
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'release:')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Determine version bump
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.release_type }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get commit messages since the last release tag.
          # IMPORTANT: if no tag exists we still walk only the most recent
          # commit, NOT the full history — otherwise the very first pipeline
          # run on a long-lived repo can pick up stale "breaking change"
          # wording from years-old commits and ship a bogus major bump.
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LAST_TAG" ]; then
            echo "No prior version tag found — only inspecting the latest commit."
            COMMIT_RANGE_DESC="HEAD~0..HEAD (no prior tag)"
            COMMIT_SUBJECTS=$(git log -1 --pretty=format:"%s" --no-merges)
            COMMIT_BODIES=$(git log -1 --pretty=format:"%B" --no-merges)
          else
            COMMIT_RANGE_DESC="${LAST_TAG}..HEAD"
            COMMIT_SUBJECTS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" --no-merges)
            COMMIT_BODIES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%B" --no-merges)
          fi

          echo "Commits considered ($COMMIT_RANGE_DESC):"
          echo "$COMMIT_SUBJECTS"

          # Conventional Commits classification:
          #   feat:        → minor
          #   fix:         → patch
          #   type!:       → major (! before colon on the subject)
          #   BREAKING CHANGE: footer in body → major
          # `BREAKING CHANGE` is case-sensitive per the Conventional Commits
          # spec and MUST end with a colon to be treated as a footer — that
          # rules out subject lines like "updated breaking change section".
          BUMP="none"

          if echo "$COMMIT_SUBJECTS" | grep -qE "^[a-z]+(\([^)]+\))?!:"; then
            BUMP="major"
          elif echo "$COMMIT_BODIES" | grep -qE "(^|[[:space:]])BREAKING[ -]CHANGE:"; then
            BUMP="major"
          elif echo "$COMMIT_SUBJECTS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP="minor"
          elif echo "$COMMIT_SUBJECTS" | grep -qE "^fix(\([^)]+\))?:"; then
            BUMP="patch"
          fi

          echo "type=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: version
        if: steps.bump.outputs.type != 'none'
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        if: steps.bump.outputs.type != 'none'
        run: |
          git add package.json package-lock.json
          git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Publish to npm
        if: steps.bump.outputs.type != 'none'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PUBLISHED=$(npm view konsole-logger version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "Version $VERSION is already published to npm. Skipping."
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.bump.outputs.type != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true

      - name: Skip release
        if: steps.bump.outputs.type == 'none'
        run: echo "No release-triggering commits found (feat:/fix:/BREAKING CHANGE). Skipping release."
